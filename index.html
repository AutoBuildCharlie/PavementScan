<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cracking &amp; Sealing Est.</title>
  <link rel="stylesheet" href="style.css?v=34">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ─── HEADER ──────────────────────────────────────────── -->
  <header id="app-header">
    <div class="header-left">
      <h1>Cracking &amp; Sealing <em>Est.</em></h1>
      <span class="header-sub">Street Assessment Tool</span>
    </div>
    <div class="header-right">
      <div class="stat-pill" id="stat-streets">
        <span class="stat-label">Streets</span>
        <span class="stat-value" id="total-streets">0</span>
      </div>
      <div class="stat-pill" id="stat-sqft">
        <span class="stat-label">Total Sq Ft</span>
        <span class="stat-value" id="total-sqft">0</span>
      </div>
      <div class="stat-pill" id="stat-rating">
        <span class="stat-label">Avg Rating</span>
        <span class="stat-value" id="avg-rating">—</span>
      </div>
      <button class="btn-report" onclick="generateProjectReport()" title="Generate project report">Report</button>
    </div>
  </header>

  <!-- ─── REPORT MODAL ───────────────────────────────────── -->
  <div id="report-overlay" class="modal-overlay hidden" onclick="closeReport(event)">
    <div class="modal report-modal" onclick="event.stopPropagation()">
      <button class="btn-close" onclick="closeReport()" style="position:absolute;top:10px;right:14px;">&times;</button>
      <h3 id="report-title">Project Report</h3>
      <div id="report-content" class="report-content">Generating report...</div>
    </div>
  </div>

  <!-- ─── MAIN LAYOUT ────────────────────────────────────── -->
  <main id="app-main">

    <!-- LEFT PANEL — Street List -->
    <aside id="street-panel">
      <div class="project-bar" id="project-selector"></div>
      <div class="panel-header">
        <h2>Streets</h2>
        <button id="btn-add-street" class="btn-primary" onclick="openAddStreetModal()">+ Add Street</button>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search address or intersection (Ball Rd &amp; Harbor Blvd)" onkeydown="if(event.key==='Enter')searchLocation()">
        <button class="btn-search" onclick="searchLocation()" title="Search">&#128269;</button>
        <button class="btn-nearme" onclick="goToMyLocation()" title="Near Me">&#9673;</button>
      </div>
      <div class="quick-actions">
        <button class="qa-btn qa-highlight" onclick="startFreeHighlight()" title="Highlight a street">
          <span class="qa-icon">&#9998;</span> Highlight
        </button>
        <button class="qa-btn qa-streetview" onclick="toggleStreetView()" title="Street View — click map to look around">
          <span class="qa-icon">&#128065;</span> Street View
        </button>
        <button class="qa-btn qa-photo" onclick="startFreePhoto()" title="Take a crack photo">
          <span class="qa-icon">&#128247;</span> Photo
        </button>
      </div>
      <div id="highlight-bar" class="highlight-bar hidden">
        <span id="highlight-bar-text">Click the START of a street</span>
        <button class="btn-cancel-highlight" onclick="cancelHighlight()">Done</button>
      </div>
      <div id="street-list" class="street-list">
        <div class="empty-state">No streets added yet.<br>Click <strong>+ Add Street</strong> to begin.</div>
      </div>
    </aside>

    <!-- CENTER — Map -->
    <section id="map-container">
      <div id="map"></div>
      <div id="streetview-panel" class="hidden">
        <div id="streetview-pano"></div>
        <button id="btn-close-sv" class="btn-close-sv" onclick="closeStreetViewPanel()">Back to Map</button>
      </div>
    </section>

    <!-- RIGHT PANEL — Street Detail -->
    <aside id="detail-panel" class="hidden">
      <button class="btn-close" onclick="closeDetailPanel()">&times;</button>
      <div id="detail-content"></div>
    </aside>

  </main>

  <!-- ─── ADD STREET MODAL ────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Add Street</h3>
      <div class="form-group">
        <label for="input-street-name">Street Name</label>
        <input type="text" id="input-street-name" placeholder="e.g. 1200 W Ball Rd, Anaheim, CA">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="input-length">Length (ft)</label>
          <input type="number" id="input-length" placeholder="e.g. 500">
        </div>
        <div class="form-group">
          <label for="input-width">Width (ft)</label>
          <input type="number" id="input-width" placeholder="e.g. 24">
        </div>
      </div>
      <div class="form-group">
        <label for="input-notes">Notes (optional)</label>
        <textarea id="input-notes" rows="2" placeholder="Parking lot, residential, etc."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" id="btn-save-street" onclick="saveStreet()">Add &amp; Scan</button>
      </div>
    </div>
  </div>

  <!-- ─── SCANNING MODAL ─────────────────────────────────── -->
  <div id="scan-overlay" class="modal-overlay hidden" style="display:none">
    <div class="modal scan-modal">
      <div class="scan-spinner"></div>
      <h3>Scanning Street View...</h3>
      <p id="scan-status">Pulling imagery and analyzing pavement condition</p>
    </div>
  </div>

  <!-- ─── SCRIPTS ─────────────────────────────────────────── -->
  <script src="app.js?v=34"></script>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyALUzyaUCMmtVah_gcnoe-g2VGeezsPkZ8&callback=initMap">
  </script>

</body>
</html>
